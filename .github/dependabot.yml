# Dependabot — https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
    groups:
      # Group minor + patch bumps into a single PR for quieter review.
      production-dependencies:
        patterns: ['*']
        update-types: ['minor', 'patch']
      # Group dev-dep majors together — reviewed but merged on green CI.
      dev-dependencies-major:
        dependency-type: 'development'
        update-types: ['major']

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    commit-message:
      prefix: 'chore(ci)'
    labels:
      - 'ci'
      - 'dependencies'
    groups:
      # One PR per week for all action bumps (majors included) — green CI is
      # the gate, not human review of each individual tag.
      actions:
        patterns: ['*']
