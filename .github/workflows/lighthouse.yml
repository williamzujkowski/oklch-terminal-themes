name: Lighthouse

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'site/.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'site/.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

permissions: read-all

jobs:
  lighthouse:
    name: Lighthouse (site)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Build TypeScript (required by site import)
        run: pnpm build:ts

      - name: Build site
        run: pnpm --filter @williamzujkowski/oklch-terminal-themes-site build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./site/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
