name: Lighthouse

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'site/.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  pull_request:
    paths:
      - 'site/**'
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'site/.lighthouserc.json'
      - '.github/workflows/lighthouse.yml'
  workflow_dispatch:

permissions: read-all

jobs:
  lighthouse:
    name: Lighthouse (site)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Build TypeScript (required by site import)
        run: pnpm build:ts

      - name: Build site
        run: pnpm --filter @williamzujkowski/oklch-terminal-themes-site build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./site/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
