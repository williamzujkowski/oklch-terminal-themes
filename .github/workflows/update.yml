name: Update Upstream Themes

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sync upstream
        run: |
          rm -f .upstream-shas.json
          pnpm tsx scripts/fetch-upstream.ts
      - name: Build + validate
        run: |
          pnpm build:data
          pnpm validate
          pnpm test
      - name: Create PR on diff
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: 'chore: sync upstream color schemes'
          commit-message: 'chore: sync upstream color schemes'
          branch: automated/upstream-sync
          body: |
            Automated sync of all upstream sources listed in `sources.json`.

            - ΔE2000 gate passed (< 1.0 round-trip)
            - Zod schema validation passed
            - Vitest suite passed
          add-paths: |
            data/**
            .upstream-shas.json
