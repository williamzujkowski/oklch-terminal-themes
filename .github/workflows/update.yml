name: Update Upstream Themes

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sync upstream
        run: |
          rm -f .upstream-shas.json
          pnpm tsx scripts/fetch-upstream.ts
      - name: Build + validate
        run: |
          pnpm build:data
          pnpm validate
          pnpm test
      - name: Create PR on diff
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: 'chore: sync upstream color schemes'
          commit-message: 'chore: sync upstream color schemes'
          branch: automated/upstream-sync
          body: |
            Automated sync of all upstream sources listed in `sources.json`.

            - ΔE2000 gate passed (< 1.0 round-trip)
            - Zod schema validation passed
            - Vitest suite passed
          add-paths: |
            data/**
            .upstream-shas.json
