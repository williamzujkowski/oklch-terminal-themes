name: Update Upstream Themes

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Sync upstream
        run: |
          rm -f .upstream-sha
          pnpm tsx scripts/fetch-upstream.ts
      - name: Build + validate
        run: |
          pnpm build:data
          pnpm validate
          pnpm test
      - name: Create PR on diff
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: 'chore: sync upstream color schemes'
          commit-message: 'chore: sync upstream color schemes'
          branch: automated/upstream-sync
          body: |
            Automated sync from `mbadolato/iTerm2-Color-Schemes`.

            - ΔE2000 gate passed (< 1.0 round-trip)
            - Zod schema validation passed
            - Vitest suite passed
          add-paths: |
            data/**
            .upstream-sha
