# Gitleaks configuration for oklch-terminal-themes.
# Scans staged files for accidental secret commits.

title = "oklch-terminal-themes secret scanning"

[extend]
useDefault = true

[allowlist]
description = "Documentation examples and generated dataset"

# Path-based: skip generated data, docs, test fixtures, and per-source SHA
# pins (every value in `.upstream-shas.json` is a public git commit hash, but
# the generic-api-key rule false-positives on 40-hex strings paired with
# "token"-shaped keys, e.g. the `thorsten-token` source id from
# ThorstenRhau/token).
paths = [
  '''data/''',
  '''upstream/''',
  '''\.md$''',
  '''CHANGELOG\.md$''',
  '''test/fixtures/''',
  '''\.upstream-shas\.json$''',
]

# Stopword-based: obvious fakes ignored regardless of path.
stopwords = [
  "EXAMPLE",
  "NOT-REAL",
  "NOT_REAL",
  "NOTREAL",
  "TESTFAKE",
  "xxxxxxxxxxxx",
  "000000000000",
]
